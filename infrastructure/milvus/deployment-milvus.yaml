# Standalone Milvus for RAG vector store.
# Object storage: in-cluster MinIO (installed by Argo in sync-wave 1); or override via milvus-s3-config for external S3.
# Metadata: etcd. Local data: PVCs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
        app.kubernetes.io/component: vector-db
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.0
          ports:
            - containerPort: 19530
            - containerPort: 9091
          env:
            - name: ETCD_ENDPOINTS
              value: "milvus-etcd.rag-demo.svc:2379"
            - name: MINIO_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: milvus-s3-config
                  key: S3_ENDPOINT
            - name: MINIO_PORT
              valueFrom:
                configMapKeyRef:
                  name: milvus-s3-config
                  key: S3_PORT
            - name: MINIO_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: milvus-s3-config
                  key: S3_USE_SSL
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: milvus-s3-credentials
                  key: accesskeyid
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: milvus-s3-credentials
                  key: secretaccesskey
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2"
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-data
---
# etcd for Milvus metadata (data on IBM storage via PVC).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.9
          command:
            - etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://milvus-etcd.rag-demo.svc:2379
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd-data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: etcd-data
          persistentVolumeClaim:
            claimName: milvus-etcd-data
---
# MinIO for Milvus object storage (S3-compatible). Sync-wave 1 so it is ready before Milvus.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: milvus-s3-credentials
                  key: accesskeyid
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milvus-s3-credentials
                  key: secretaccesskey
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: milvus-minio-data