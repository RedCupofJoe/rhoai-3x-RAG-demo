apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP
  selector:
    app: milvus
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: rag-demo
spec:
  ports:
    - port: 2379
      targetPort: 2379
      name: client
  selector:
    app: milvus-etcd
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: rag-demo
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: api
  selector:
    app: milvus-minio
