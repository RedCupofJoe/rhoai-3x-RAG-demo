# Object storage config for Milvus. Default: in-cluster MinIO (installed by Argo).
# For external S3: patch S3_ENDPOINT, S3_PORT, S3_USE_SSL, S3_BUCKET_NAME and replace milvus-s3-credentials.
apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-s3-config
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  # In-cluster MinIO (default). For AWS S3 use e.g. s3.amazonaws.com, port 443, SSL true.
  S3_ENDPOINT: "milvus-minio.rag-demo.svc"
  S3_PORT: "9000"
  S3_USE_SSL: "false"
  S3_BUCKET_NAME: "milvus-rag"
