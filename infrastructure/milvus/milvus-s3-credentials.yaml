# Default credentials for in-cluster MinIO (and for Milvus to connect to it).
# Argo creates this so MinIO and Milvus work out of the box. For production or
# external S3, replace with: oc create secret generic milvus-s3-credentials -n rag-demo \
#   --from-literal=accesskeyid="YOUR_ACCESS_KEY" --from-literal=secretaccesskey="YOUR_SECRET" \
#   --dry-run=client -o yaml | oc apply -f -
# Then delete this file from the kustomization or overlay to avoid overwriting.
apiVersion: v1
kind: Secret
metadata:
  name: milvus-s3-credentials
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  accesskeyid: "minioadmin"
  secretaccesskey: "minioadmin"
