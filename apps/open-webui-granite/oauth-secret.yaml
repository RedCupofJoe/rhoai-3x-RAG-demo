# Session secret: oc create secret generic open-webui-granite-oauth -n rag-demo --from-literal=session_secret=$(head -c 43 /dev/urandom | base64)
# TLS secret open-webui-granite-tls auto-created by OpenShift serving-cert annotation on Service
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-granite-oauth
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
type: Opaque
stringData:
  session_secret: "CHANGE_ME_USE_OC_CREATE_SECRET"
