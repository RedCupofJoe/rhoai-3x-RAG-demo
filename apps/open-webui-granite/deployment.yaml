# Open WebUI for granite-7b - OAuth proxy sidecar
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui-granite
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui-granite
  template:
    metadata:
      labels:
        app: open-webui-granite
        app.kubernetes.io/component: frontend
        rag-demo/model: granite-7b
    spec:
      serviceAccountName: open-webui-granite
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OLLAMA_BASE_URL
              value: "http://granite-7b-predictor.rag-demo.svc.cluster.local/v1"
            - name: OPEN_WEBUI_HEADER_TITLE
              value: "RAG Chat — Granite 7B"
            - name: ENABLE_CONTEXT_UPLOAD
              value: "true"
            - name: WEBUI_NAME
              value: "Granite 7B"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy:latest
          args:
            - -provider=openshift
            - -https-address=:8443
            - -http-address=
            - -upstream=http://localhost:8080
            - -client-id=system:api-server
            - -openshift-service-account=open-webui-granite
            - -cookie-secret-file=/etc/oauth-proxy/secrets/session_secret
            - -tls-cert=/etc/tls/private/tls.crt
            - -tls-key=/etc/tls/private/tls.key
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: oauth-proxy-secrets
              mountPath: /etc/oauth-proxy/secrets
              readOnly: true
            - name: tls
              mountPath: /etc/tls/private
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: oauth-proxy-secrets
          secret:
            secretName: open-webui-granite-oauth
        - name: tls
          secret:
            secretName: open-webui-granite-tls
