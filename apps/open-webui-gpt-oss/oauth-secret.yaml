# Create session secret: oc create secret generic open-webui-gpt-oss-oauth -n rag-demo --from-literal=session_secret=$(head -c 43 /dev/urandom | base64)
# TLS secret open-webui-gpt-oss-tls is auto-created by OpenShift via service.alpha.openshift.io/serving-cert-secret-name
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-gpt-oss-oauth
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
type: Opaque
stringData:
  session_secret: "CHANGE_ME_USE_OC_CREATE_SECRET"
