# Session secret: oc create secret generic open-webui-oauth -n rag-demo --from-literal=session_secret=$(openssl rand -base64 32)
# TLS secret open-webui-tls is created by OpenShift from the Service serving-cert annotation.
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-oauth
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
type: Opaque
stringData:
  session_secret: "CHANGE_ME_USE_OC_CREATE_SECRET"
