apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    service.alpha.openshift.io/serving-cert-secret-name: open-webui-tls
spec:
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app: open-webui
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-internal
  namespace: rag-demo
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: open-webui
