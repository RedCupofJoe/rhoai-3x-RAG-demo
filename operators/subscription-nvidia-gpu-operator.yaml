# Red Hat Certified Operators are preferred. Use redhat-operators when the operator
# is available there. NVIDIA GPU Operator is currently documented by Red Hat from
# certified-operators; if your cluster lists it from redhat-operators, switch to:
#   name: nvidia-gpu-operator
#   source: redhat-operators
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: nvidia-gpu-operator
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: gpu-operator-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
