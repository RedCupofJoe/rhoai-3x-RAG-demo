apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ""
resources:
  # Wave 1: Operator install namespaces, groups, subscriptions (CRDs must exist before DSC/DSCI)
  - namespace-redhat-ods-operator.yaml
  - operator-group-redhat-ods-operator.yaml
  - subscription-rhods-operator.yaml
  - namespace-nvidia-gpu.yaml
  - operator-group-nvidia-gpu.yaml
  - subscription-nvidia-gpu-operator.yaml
  - subscription-openshift-pipelines-operator.yaml
  # OpenShift GitOps is typically pre-installed on SNO; uncomment if needed
  # - subscription-openshift-gitops-operator.yaml
  # Wave 2–3: RHOAI cluster configuration (after rhods-operator CRDs are available)
  - dscinitialization-default.yaml
  - datasciencecluster-default.yaml
commonLabels:
  app.kubernetes.io/part-of: rag-demo
  rag-demo.gitops/sync-wave: "1"
