---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-demo-pipelines
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/rhoai-3x-RAG-demo.git
    path: pipelines
