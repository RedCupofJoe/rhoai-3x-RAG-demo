# App-of-Apps: deploy this from ArgoCD (bootstrap Application points to path: argocd).
# Sync order: Wave 1 Operators → Wave 2 Infrastructure → Wave 3 Models → Wave 4 Pipelines → Wave 5 Apps
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-demo-operators
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/rhoai-3x-RAG-demo.git
    path: operators
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ""
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-demo-infrastructure
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/rhoai-3x-RAG-demo.git
    path: infrastructure
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rag-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-demo-models
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/rhoai-3x-RAG-demo.git
    path: models
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
