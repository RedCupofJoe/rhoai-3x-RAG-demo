---
# PipelineRun template for manual or cron-based runs (e.g. monitor rag-doc/)
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: rag-docling-milvus-run-template
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    # Skip this template in sync; use as reference for manual/cron runs
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  pipelineRef:
    name: rag-docling-milvus
  params:
    - name: milvus-host
      value: milvus.rag-demo.svc
    - name: collection-name
      value: rag_docs
  workspaces:
    - name: rag-doc
      persistentVolumeClaim:
        claimName: rag-docs
    - name: s3-downloaded
      emptyDir: {}
    - name: parsed-output
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
  timeout: 1h0m0s
