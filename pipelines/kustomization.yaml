apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rag-demo
resources:
  - pipeline-rag-docling-milvus.yaml
  - task-docling-parse.yaml
  - task-chunk-upsert-milvus.yaml
  - pvc-rag-docs.yaml
  - trigger-event-listener.yaml
commonLabels:
  app.kubernetes.io/part-of: rag-demo
  rag-demo.gitops/sync-wave: "4"
configMapGenerator:
  - name: docling-parse-scripts
    files:
      - scripts/docling_parse.py
    options:
      disableNameSuffixHash: true
  - name: chunk-upsert-scripts
    files:
      - scripts/chunk_upsert_milvus.py
    options:
      disableNameSuffixHash: true
