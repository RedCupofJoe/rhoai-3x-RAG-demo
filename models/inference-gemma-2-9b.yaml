# gemma-2-9b-it from RHOAI Model Catalog
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gemma-2-9b-it
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  predictor:
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-gpu-runtime
      storage:
        key: localMinIO
        path: gemma-2-9b-it
    minReplicas: 1
    maxReplicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
        memory: "28Gi"
        cpu: "4"
      requests:
        nvidia.com/gpu: "1"
        memory: "24Gi"
        cpu: "2"
    nodeSelector:
      nvidia.com/gpu.present: "true"
    tolerations:
      - key: "nvidia.com/gpu"
        operator: Exists
        effect: NoSchedule
