# vLLM ServingRuntime for catalog / registry–backed models (RHOAI 3.3, RawDeployment).
# Scheduling matches Hardware Profiles: node selectors + GPU tolerations (e.g. NVIDIA H100).
# Align nodeSelector labels with your cluster (oc get nodes --show-labels) and dashboard Hardware Profiles.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-gpu-runtime
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    openshift.io/display-name: "vLLM GPU (H100)"
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
    - name: vllm
      version: "1"
      autoSelect: true
  multiModel: false
  protocolVersions:
    - v2
  grpcDataEndpoint: "port:8001"
  containers:
    - name: kserve-container
      image: quay.io/opendatahub/kserve-vllm:latest
      resources:
        limits:
          nvidia.com/gpu: "1"
          memory: "40Gi"
          cpu: "8"
        requests:
          nvidia.com/gpu: "1"
          memory: "32Gi"
          cpu: "4"
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
  tolerations:
    - key: "nvidia.com/gpu"
      operator: Exists
      effect: NoSchedule
