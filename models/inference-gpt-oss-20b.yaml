# gpt-OSS-20B — model weights via KServe storage URI (HF / OCI ModelCar from AI Hub catalog or registry).
# RHOAI 3.3: prefer catalog/registry OCI references (registry.redhat.io) so pulls use the cluster pull secret.
# Replace spec.predictor.model.storage.uri with the exact URI from AI Hub → Catalog → Deploy (or Model Registry).
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gpt-oss-20b
  namespace: rag-demo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  predictor:
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-gpu-runtime
      storage:
        uri: hf://openai/gpt-oss-20b
    minReplicas: 1
    maxReplicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
        memory: "42Gi"
        cpu: "8"
      requests:
        nvidia.com/gpu: "1"
        memory: "38Gi"
        cpu: "4"
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
    tolerations:
      - key: "nvidia.com/gpu"
        operator: Exists
        effect: NoSchedule
